name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Matrix expands to 2 OS × 4 Python = 8 parallel jobs. `fail-fast: false`
    # is mandatory so a Windows-only flake can't mask Linux's results: we
    # want to see every cell of the matrix on every run.
    #
    # Cost note: `windows-latest` minutes are billed at 2× `ubuntu-latest`
    # in GitHub Actions, but at 8 jobs total (vs. 4 ubuntu-only before)
    # the bill change is small enough not to perceive. macOS would
    # double again — deliberately deferred for now.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest tests/ -v --tb=short

  mypy:
    runs-on: ubuntu-latest
    name: mypy --strict
    # Single Python version on purpose: mypy resolves `python_version` from
    # `[tool.mypy]` in pyproject.toml (currently 3.11), so static type
    # checking is platform- and runtime-version-independent. Pinning to the
    # lowest supported version (3.11 per `requires-python = ">=3.11"`)
    # catches type-system errors that 3.12+ would silently accept.
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev extras + mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install mypy

      - name: Run mypy strict
        run: mypy --strict claude_mirror/
